<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>My Profile | ConnectHub</title>

    <link rel="stylesheet" href="../css/feed.css">
    <link rel="stylesheet" href="../css/profile.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">

            <h2>ConnectHub</h2>

            <p>Share • Connect • Inspire</p>

        </div>

        <div class="nav-right">

            <a href="feed.html">
                <button>Home</button>
            </a>

            <a href="create-post.html">
                <button>Create Post</button>
            </a>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

    </nav>

    <div class="create-post-container">

        <div class="profile-top">

            <img
                id="profileImage"
                src="../images/default-profile.png"
                class="profile-image-large">

            <h2 id="fullName"></h2>

            <p id="username"></p>

            <p id="email"></p>

            <p id="bio"></p>

        </div>

        <div class="profile-stats">

            <div class="stat">

                <h2 id="postCount">0</h2>

                <p>Posts</p>

            </div>

            <div class="stat">

                <h2 id="likeCount">0</h2>

                <p>Likes</p>

            </div>

            <div class="stat">

                <h2 id="followersCount">0</h2>

                <p>Followers</p>

            </div>

            <div class="stat">

                <h2 id="followingCount">0</h2>

                <p>Following</p>

            </div>

        </div>

        <br>

        <a href="edit-profile.html">

            <button class="delete-btn">

                ✏ Edit Profile

            </button>

        </a>

        <hr style="margin:25px 0;">

        <h2 class="section-title">

            My Posts

        </h2>

        <br>

        <div id="myPosts"></div>

    </div>

    <script src="../js/profile.js"></script>

</body>

</html>
